name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: incidents.settings.test

      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: incidents_test
      DB_USER: test_user
      DB_PASSWORD: test_password

      VEHICLES_API_URL: http://vehicles-service:8000

      AWS_REGION: us-east-1
      SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/test-queue

    services:
      postgres:
        image: postgres:16.3-alpine3.20
        env:
          POSTGRES_DB: incidents_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: |
          ruff check incidents tests

      - name: Run MyPy
        run: |
          mypy incidents

      - name: Run unit tests
        run: |
          pytest tests/unit \
            -v \
            --cov=incidents \
            --cov-fail-under=80 \
            --cov-report=xml

      - name: Run integration tests
        run: |
          pytest tests/integration -v

      - name: Code coverage report
        run: |
          coverage report
          coverage html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check code formatting
        run: |
          black --check incidents tests

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag incidents-service:latest .

      - name: Run Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e DJANGO_SETTINGS_MODULE=incidents.settings.test \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=incidents_test \
            -e DB_USER=test_user \
            -e DB_PASSWORD=test_password \
            -e VEHICLES_API_URL=http://vehicles-service:8000 \
            -e AWS_REGION=us-east-1 \
            -e SQS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/000000000000/test-queue \
            incidents-service:latest \
            python -m pytest tests/unit -q