# Docker Compose configuration for local development and testing
version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: incidents-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5050:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: ["-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incidents-network

  # Incidents Microservice
  incidents-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incidentes-servicio
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      VEHICLES_API_URL: ${VEHICLES_API_URL}
      LOG_LEVEL: INFO
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - incidents-network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver"

volumes:
  postgres_data:

networks:
  incidents-network:
    driver: bridge
